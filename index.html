<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDB Factory Acceptance Test (FAT) Checklist</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: 'Prompt', sans-serif;
            box-sizing: border-box;
        }

        :root{
            --mea-orange:#F37021;
            --mea-orange-dark:#D95D13;
        }

        body{
            background:#f9fafb;
        }

        .mea-bg{
            background:var(--mea-orange);
        }

        .mea-text{
            color:var(--mea-orange);
        }

        .section-header{
            background:linear-gradient(135deg,var(--mea-orange),var(--mea-orange-dark));
        }

        .critical-header{
            background:linear-gradient(135deg,#ef4444,#f37021);
        }

        .radio-card{
            transition:all .2s ease;
        }

        .pass-selected{
            background:#dcfce7 !important;
            border-color:#22c55e !important;
            color:#15803d !important;
            font-weight:600;
        }

        .fail-selected{
            background:#fee2e2 !important;
            border-color:#ef4444 !important;
            color:#b91c1c !important;
            font-weight:600;
        }

        .floating-print{
            position:fixed;
            bottom:20px;
            right:20px;
            z-index:999;
        }

        @page{
            size:A4 portrait;
            margin:10mm;
        }

        @media print {
            body{
                background:white !important;
            }

            .floating-print,
            .floating-clear{
                display:none !important;
            }

            .shadow-md,
            .shadow-lg{
                box-shadow:none !important;
            }

            .section-card{
                overflow:visible !important;
                page-break-before: always;
                break-before: page;
            }
            
            .section-card:first-child{
                page-break-before: auto;
                break-before: auto;
            }
            
            .print-page-break {
                page-break-before: always !important;
                break-before: page !important;
            }

            .check-item{
                break-inside:avoid;
                page-break-inside:avoid;
            }

            input,
            textarea{
                border:none !important;
                background:transparent !important;
                padding:0 !important;
            }

            textarea{
                height:auto !important;
                overflow:visible !important;
                white-space:pre-wrap !important;
            }
            
            /* แสดงเส้นใต้จางๆ สำหรับช่อง Remarks ตอนพิมพ์ออกกระดาษ */
            .remarks-container {
                border-top: 1px dashed #ccc !important;
                margin-top: 8px !important;
                padding-top: 4px !important;
            }
        }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-7xl mx-auto p-4 md:p-8">

    <div class="bg-white rounded-2xl shadow-lg overflow-hidden mb-6">
        <div class="mea-bg text-white p-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold">
                        Check list ตรวจสอบตู้ MDB ที่โรงงาน (FAT test)
                    </h1>
                    <p class="text-orange-100 mt-2">
                        Main Distribution Board (MDB) Factory Test
                    </p>
                </div>
                <div class="bg-white rounded-xl w-24 h-24 flex items-center justify-center shadow">
                    <i class="fa-solid fa-bolt text-5xl mea-text"></i>
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label class="text-sm text-gray-500">Reference Spec</label>
                    <input type="text"
                           id="referenceSpec"
                           placeholder="ระบุ Reference Spec"
                           class="w-full mt-1 border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="text-sm text-gray-500">Revision Date</label>
                    <input type="date"
                           id="revisionDate"
                           class="w-full mt-1 border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="text-sm text-gray-500">Project / MDB No.</label>
                    <input type="text"
                           id="projectNo"
                           placeholder="Enter MDB Information"
                           class="w-full mt-1 border rounded-lg px-3 py-2">
                </div>
            </div>
        </div>
    </div>

    <div id="checklistContainer"></div>

    <div class="bg-white rounded-2xl shadow-lg p-6 mt-8 print-page-break break-inside-avoid">
        
        <h2 class="text-xl font-bold mb-6 mea-text border-b pb-3">
            <i class="fa-solid fa-clipboard-check mr-2"></i>
            สรุปการตรวจสอบ
        </h2>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                ผู้ตรวจสอบ (Inspector Name)
            </label>
            <input type="text"
                   id="inspectorName"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-1 focus:ring-orange-500 focus:border-orange-500"
                   placeholder="ระบุชื่อผู้ตรวจสอบ">
        </div>

        <div id="summaryContent" class="p-4 bg-gray-50 rounded-xl border">
            <p class="text-gray-500 text-center">กรุณาทำรายการตรวจสอบเพื่อดูสรุปผล</p>
        </div>
        
    </div>

</div>

<button id="printBtn"
        onclick="printChecklist()"
        class="floating-print mea-bg hover:opacity-90 text-white px-6 py-4 rounded-full shadow-lg font-semibold text-lg">
    <i class="fa-solid fa-print mr-2"></i>
    Print / Save as PDF
</button>

<button id="clearBtn"
        onclick="clearChecklist()"
        class="floating-clear fixed bottom-24 right-5 bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-full shadow-lg font-semibold">
    <i class="fa-solid fa-trash mr-2"></i>
    Clear Data
</button>

<script>
const sections = [
    {
        title:"Section 1 : การตรวจสอบโครงสร้างและตู้ (Enclosure & Structure)",
        icon:"fa-building",
        critical:false,
        items:[

            ["1.3","ฝาตู้ทุกด้านเป็นชนิด Electrogalvanize และพ่นสี มีความหนา 2 มม.","Spec ข้อ 9.2"],
            ["1.4","- สีตู้ RAL 9002 หรือสีอื่นๆ<br>- ความหนาสี ≥ 60 ไมครอน","Spec ข้อ 9.3"],
            ["1.5","Mimic bus<br>- Normal : สีดำ / Emergency : สีแดง<br>- หนา ≥ 3 มม. / กว้าง ≥ 10 มม.","Spec ข้อ 13"],
            ["1.6","Nameplate<br>- ชื่อตู้ MDB<br>- ระบุว่าจ่ายไฟมาจากที่ไหน (From) หรือ จ่ายไฟไปที่ไหน (To)<br>- ระบุชื่อ CB Main และ Branch ทุกตัว","Spec ข้อ 13"],
            ["1.7","ป้าย<br>- MEA logo (ด้านหน้าตู้)<br>- ป้ายพิกัดรายละเอียด QR code (ด้านในฝาตู้)<br>- Logo ผู้ผลิต (ไม่กำหนด)","Spec ข้อ 13"]

    },
    {

        icon:"fa-network-wired",
        critical:false,
        items:[
            ["2.1","ขนาด Line และ Neutral Busbar<br>- L1/L2/L3 ตามแบบ<br>- N = L1/L2/L3","Spec ข้อ 10.3<br>IEC 61439-1 (คำนวนตามบัสบาร์เปลือย)"],
            ["2.2","ขนาด Ground Busbar<br>≥ 95 ตร.มม. ที่ Main CB ≤ 800 A<br>≥ 120 ตร.มม. ที่ Main CB > 800 A","Spec ข้อ 10"],
            ["2.3","สาย Bonding ระหว่าง Neutral Busbar และ Ground Busbar (ถ้ามี)","ตามแบบ"],
            ["2.4","สี Busbar<br>- L1/L2/L3 : น้ำตาล / ดำ / เทา<br>- N : ฟ้า<br>- G : เขียว","Spec ข้อ 10.7"]
        ]
    },

        title:"Section 3 : เซอร์กิตเบรกเกอร์ (Circuit Breaker)",
        icon:"fa-bolt",
        critical:false,
        items:[
            ["3.1","ตรวจสอบ CB ตามแบบ<br>- ยี่ห้อ / รุ่น<br>- Rating CB (AT/AF)<br>- จำนวน Pole (1/3)<br>- Ics, Icu (kA)","ตามแบบ"]
        ]
    },
    {
        title:"Section 4 : สายไฟและการเดินสาย (Cable & Wiring)",
        icon:"fa-plug",
        critical:false,
        items:[
            ["4.1","สายควบคุมเป็นชนิด IEC 08 (HVSF)","Spec ข้อ 11.1"],
            ["4.2","ขนาดสายควบคุม<br>- Current/Voltage/Control circuit 2.5 ตร.มม.","Spec ข้อ 11.1"],
            ["4.3","สาย Ground บานประตู<br>- 10 ตร.มม.<br>- ใช้สายทองแดงถัก (ไม่ใช้สาย IEC01)","Spec ข้อ 11.1"],

    },

        title:"Section 5 : อุปกรณ์เครื่องวัด (Current transformer, Lamp, Digital meter)",
        icon:"fa-gauge-high",
        critical:false,
        items:[
            ["5.1","Current Transformer<br>- Ratio xxx/1 หรือ xxx/5<br>- Class และ Burden","ตามแบบ"],
            ["5.2","Pilot lamp<br>- L1/L2/L3 : สีขาว","Spec ข้อ 12.2"],
            ["5.3","Fuse (ถ้ามี)<br>- จัดหา fuse (spare) 10% ของทั้งหมด","Spec ข้อ 12.3"]
        ]

    {
        title:"Section 6 : ทดสอบการทำงาน (Function test)",
        icon:"fa-gears",
        critical:false,
        items:[
            ["6.1","ทดสอบการทำงานของวงจรควบคุม (Alarm, status, trip, interlock, …)",""],
            ["6.2","ทดสอบการทำงานของ Meter<br>- ตรวจสอบ V/I/Watt/Var/VA/p.f.",""],
            ["6.3","ทดสอบ test trip ของ MCCB",""],
            ["6.4","ทดสอบ Trip unit ของ ACB",""]
        ]
    },
    {

const container = document.getElementById("checklistContainer");
let fullHtml = ""; // สร้างตัวแปรเก็บ HTML ทั้งหมดเพื่อประสิทธิภาพในการ Render หลังจบลูป

sections.forEach((section, sIndex)=>{

    <div class="section-card bg-white rounded-2xl shadow-md overflow-hidden mb-6">
        <div class="${section.critical ? 'critical-header' : 'section-header'} text-white p-4">
            <div class="flex items-center justify-between">
                <h2 class="font-bold text-lg md:text-xl flex items-center gap-3">
                    <div class="bg-white text-gray-700 w-10 h-10 rounded-lg flex items-center justify-center shadow">
                        <i class="fa-solid ${section.icon}"></i>
                    </div>
                    ${section.title}
                </h2>
                ${section.critical ? '<span class="bg-white text-red-600 px-3 py-1 rounded-full text-xs font-bold">CRITICAL TEST</span>' : ''}
            </div>
        </div>
        <div class="p-4">
            <div class="hidden md:grid md:grid-cols-12 gap-3 font-semibold text-gray-700 border-b pb-3 mb-3">
                <div class="col-span-1">Item</div>
                <div class="col-span-6">Description</div>
                <div class="col-span-2">Reference</div>
                <div class="col-span-3">Result</div>
            </div>
    `;

    section.items.forEach((item, i)=>{
        const radioName = `section${sIndex}_item${i}`;

        <div class="check-item border rounded-xl p-4 mb-3 bg-gray-50">
            <div class="grid md:grid-cols-12 gap-3 items-center">
                <div class="md:col-span-1">
                    <span class="font-bold">${item[0]}</span>
                </div>
                <div class="md:col-span-6">
                    <div class="font-medium">${item[1]}</div>
                </div>
                <div class="md:col-span-2">
                    <span class="text-sm text-gray-600">${item[2]}</span>
                </div>
                <div class="md:col-span-3">
                    <div class="flex gap-2">
                        <label class="radio-card pass-option border rounded-lg px-3 py-2 cursor-pointer flex-1 text-center bg-white">
                            <input type="radio" name="${radioName}" value="Pass" class="hidden">
                            <i class="fa-solid fa-circle-check"></i> ผ่าน
                        </label>
                        <label class="radio-card fail-option border rounded-lg px-3 py-2 cursor-pointer flex-1 text-center bg-white">
                            <input type="radio" name="${radioName}" value="Fail" class="hidden">
                            <i class="fa-solid fa-circle-xmark"></i> ไม่ผ่าน
                        </label>
                    </div>
                </div>
            </div>

            <div class="remarks-container mt-3 pt-3 border-t border-gray-200">
                <label class="block text-xs font-medium text-gray-500 mb-1">หมายเหตุ (Remarks)</label>
                <textarea class="remarks-input w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-orange-500 focus:border-orange-500 transition-all"

                          placeholder="ระบุข้อมูลเพิ่มเติมถ้ามี... (เช่น ค่าทดสอบจริงที่วัดได้)"></textarea>

// อัปเดต DOM เพียงครั้งเดียวอยู่นอกลูป เพื่อประสิทธิภาพ (ลด Reflow/Repaint)
container.innerHTML = fullHtml;

// Radio Button Styling และการดักจับเพื่อปรับเปลี่ยนสี UI
document.addEventListener("change",(e)=>{
    if(e.target.type === "radio"){
        const group = document.querySelectorAll(`input[name="${e.target.name}"]`);
        group.forEach(radio=>{
            const label = radio.closest("label");
            label.classList.remove("pass-selected", "fail-selected");
        });

        const selectedLabel = e.target.closest("label");
        if(e.target.value === "Pass"){
            selectedLabel.classList.add("pass-selected");
        }else{
            selectedLabel.classList.add("fail-selected");
        }
    }
});

// ฟังก์ชันสำหรับพิมพ์ (Print / Save as PDF)
function printChecklist(){
    // ปรับขนาดความสูงของ textarea ทั้งหมดให้พอดีกับข้อความก่อนทำการสั่งพิมพ์
    document.querySelectorAll(".remarks-input").forEach(textarea=>{
        textarea.style.height = "auto";
        textarea.style.height = textarea.scrollHeight + "px";
    });
    
    // เรียกคำสั่งพิมพ์ของ Browser (ส่วนการซ่อนปุ่ม ใช้ CSS @media print ควบคุมแทน ปลอดภัยกว่าการตั้งเวลาใน JS)
    window.print();
}

// ฟังก์ชันล้างข้อมูลทั้งหมด
function clearChecklist(){
    if(confirm("ต้องการล้างข้อมูลทั้งหมดหรือไม่?")){
        localStorage.removeItem("mdb_fat_checklist");
        location.reload();
    }
}
// === แทรกฟังก์ชัน updateSummary ตรงนี้ครับ ===
function updateSummary() {
    const items = document.querySelectorAll('.check-item');
    let passCount = 0;
    let failList = [];
    let pendingCount = 0;

    items.forEach((itemDom) => {
        const itemNumber = itemDom.querySelector('.font-bold').innerText;
        const itemDesc = itemDom.querySelector('.font-medium').innerHTML.split('<br>')[0]; 
        const checkedRadio = itemDom.querySelector('input[type="radio"]:checked');
        const remark = itemDom.querySelector('.remarks-input').value.trim();

        if (!checkedRadio) {
            pendingCount++;
        } else if (checkedRadio.value === 'Pass') {
            passCount++;
        } else if (checkedRadio.value === 'Fail') {
            failList.push({
                title: `${itemNumber} ${itemDesc}`,
                remark: remark || '<span class="text-gray-400 italic">ไม่ได้ระบุหมายเหตุ</span>'
            });
        }
    });

    const summaryContainer = document.getElementById('summaryContent');
    if (items.length === 0) return;

    if (pendingCount === items.length) {
        summaryContainer.innerHTML = `<p class="text-gray-500 text-center">กรุณาทำรายการตรวจสอบเพื่อดูสรุปผล</p>`;
        return;
    }

    let html = '';

    if (failList.length === 0 && pendingCount === 0) {
        html = `
            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-4 rounded-lg flex items-center shadow-sm">
                <i class="fa-solid fa-circle-check text-3xl mr-4"></i>
                <div>
                    <p class="font-bold text-lg">ผ่านเกณฑ์ทั้งหมด (All Passed)</p>
                    <p class="text-sm mt-1">การตรวจสอบสมบูรณ์แบบ ไม่มีข้อบกพร่อง</p>
                </div>
            </div>
        `;
    } else {
        if (failList.length > 0) {
            html += `
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4 flex items-center shadow-sm">
                <i class="fa-solid fa-circle-xmark text-2xl mr-3"></i>
                <p class="font-bold text-lg">พบรายการ ไม่ผ่าน จำนวน ${failList.length} ข้อ</p>
            </div>
            <div class="space-y-3">
            `;
            
            failList.forEach(fail => {
                html += `
                <div class="bg-white border border-red-200 p-4 rounded-lg shadow-sm break-inside-avoid">
                    <p class="font-bold text-red-600"><i class="fa-solid fa-triangle-exclamation mr-1"></i> ข้อ ${fail.title}</p>
                    <div class="text-sm text-gray-700 mt-2 bg-gray-50 p-3 rounded border">
                        <span class="font-semibold">หมายเหตุ:</span> ${fail.remark}
                    </div>
                </div>`;
            });
            html += `</div>`;
        } else {
             html += `
             <div class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded-lg mb-3 flex items-center shadow-sm">
                <i class="fa-solid fa-info-circle text-2xl mr-3"></i>
                <p class="font-bold text-lg">ผ่านเกณฑ์แล้ว ${passCount} ข้อ (ยังไม่พบข้อบกพร่อง)</p>
            </div>`;
        }

        if (pendingCount > 0) {
            html += `<p class="text-sm text-orange-600 mt-4 font-medium"><i class="fa-solid fa-clock mr-1"></i> * ยังมีรายการที่รอการตรวจสอบอีก ${pendingCount} ข้อ</p>`;
        }
    }

    summaryContainer.innerHTML = html;
}
// === จบฟังก์ชัน updateSummary ===

// Auto Save & Load to LocalStorage
// =====================
function saveData(){
    const data = {
        referenceSpec : document.getElementById("referenceSpec")?.value || "",
        revisionDate : document.getElementById("revisionDate")?.value || "",
        projectNo : document.getElementById("projectNo")?.value || "",
        inspector : document.getElementById("inspectorName")?.value || "",
        remarks : [],
        radios : {}
    };

    // บันทึกค่าจาก Remarks ทุกช่องลง Array
    document.querySelectorAll(".remarks-input").forEach(input=>{
        data.remarks.push(input.value);
    });

    // บันทึกค่าสถานะวิทยุ (Radio Buttons)
    document.querySelectorAll('input[type="radio"]:checked').forEach(radio=>{
        data.radios[radio.name] = radio.value;
    });

    localStorage.setItem("mdb_fat_checklist", JSON.stringify(data));
    updateSummary(); 
}

// ดักจับ Event เพื่อบันทึกข้อมูลแบบเรียลไทม์ (Auto Save)
document.addEventListener("input", saveData);
document.addEventListener("change", saveData);

// ทำระบบ Auto-resize สำหรับ Textarea เมื่อผู้ใช้กรอกข้อมูลเพิ่มขึ้น
document.addEventListener("input",(e)=>{
    if(e.target.classList.contains("remarks-input")){
        e.target.style.height = "auto";
        e.target.style.height = e.target.scrollHeight + "px";
    }
});

// โหลดข้อมูลเก่าที่เคยบันทึกไว้เมื่อเปิดหน้าเว็บขึ้นมาใหม่
window.addEventListener("load",()=>{
    const saved = localStorage.getItem("mdb_fat_checklist");
    if(!saved) return;

    const data = JSON.parse(saved);
    
    if(document.getElementById("referenceSpec")) document.getElementById("referenceSpec").value = data.referenceSpec || "";
    if(document.getElementById("revisionDate")) document.getElementById("revisionDate").value = data.revisionDate || "";
    if(document.getElementById("projectNo")) document.getElementById("projectNo").value = data.projectNo || "";
    if(document.getElementById("inspectorName")) document.getElementById("inspectorName").value = data.inspector || "";

    // คืนค่าให้กับช่อง Remarks (เรียงตามลำดับ Index ของ DOM)
    document.querySelectorAll(".remarks-input").forEach((input, index)=>{
        if(data.remarks && data.remarks[index] !== undefined){
            input.value = data.remarks[index];
        }
        // ปรับความสูงของช่องให้พอดีข้อมูลที่ดึงขึ้นมาทันที
        input.style.height = "auto";
        input.style.height = input.scrollHeight + "px";
    });

    // คืนค่าปุ่มเลือก (Pass/Fail) พร้อมใส่สีไฮไลต์ให้ถูกต้อง
    Object.keys(data.radios || {}).forEach(name=>{
        const radio = document.querySelector(`input[name="${name}"][value="${data.radios[name]}"]`);
        if(radio){
            radio.checked = true;
            const label = radio.closest("label");
            if(radio.value === "Pass"){
                label.classList.add("pass-selected");
            }else{
                label.classList.add("fail-selected");
            }
        }
    });
    updateSummary();
});
</script>

</body>
</html>
