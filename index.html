<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDB Factory Acceptance Test (FAT) Checklist</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        *{ font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        :root{ --mea-orange:#F37021; --mea-orange-dark:#D95D13; }
        body{ background:#f9fafb; }
        .mea-bg{ background:var(--mea-orange); }
        .mea-text{ color:var(--mea-orange); }
        .section-header{ background:linear-gradient(135deg,var(--mea-orange),var(--mea-orange-dark)); }
        .critical-header{ background:linear-gradient(135deg,#ef4444,#f37021); }
        .radio-card{ transition:all .2s ease; }
        .pass-selected{ background:#dcfce7 !important; border-color:#22c55e !important; color:#15803d !important; font-weight:600; }
        .fail-selected{ background:#fee2e2 !important; border-color:#ef4444 !important; color:#b91c1c !important; font-weight:600; }
        .floating-print{ position:fixed; bottom:20px; right:20px; z-index:999; }
        .floating-clear{ position:fixed; bottom:90px; right:20px; z-index:999; }

        /* Container สำหรับสร้าง PDF เท่านั้น */
        #printContainer {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 800px; /* บังคับความกว้างหน้ากระดาษ */
            background: white;
            z-index: -1000;
        }
        
        /* ป้องกันการตัดขาดครึ่งข้อตอนสร้าง PDF */
        .pdf-avoid-break { page-break-inside: avoid; break-inside: avoid; }
    </style>
</head>
<body class="min-h-screen pb-10 relative overflow-x-hidden">

<div id="appContainer" class="max-w-7xl mx-auto p-4 md:p-8">

    <div class="bg-white rounded-2xl shadow-lg overflow-hidden mb-6">
        <div class="mea-bg text-white p-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold">Check list ตรวจสอบตู้ MDB ที่โรงงาน (FAT test)</h1>
                    <p class="text-orange-100 mt-2">Main Distribution Board (MDB) Factory Test</p>
                </div>
            </div>
        </div>

        <div class="p-6 grid md:grid-cols-3 gap-6">
            <div>
                <label class="text-sm text-gray-500">Reference Spec</label>
                <input type="text" id="referenceSpec" placeholder="ระบุ Reference Spec" class="w-full mt-1 border rounded-lg px-3 py-2 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-orange-500">
            </div>
            <div>
                <label class="text-sm text-mea-orange font-bold">ผู้ตรวจสอบ (Inspector)</label>
                <input type="text" id="inspectorName" placeholder="ระบุชื่อผู้ตรวจสอบ" class="w-full mt-1 border border-orange-300 rounded-lg px-3 py-2 bg-orange-50 focus:outline-none focus:ring-1 focus:ring-orange-500">
            </div>
            <div>
                <label class="text-sm text-gray-500">Project / MDB No.</label>
                <input type="text" id="projectNo" placeholder="Enter MDB Information" class="w-full mt-1 border rounded-lg px-3 py-2 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-orange-500">
            </div>
        </div>
    </div>

    <div id="checklistContainer"></div>

    <div class="bg-white rounded-2xl shadow-lg p-6 mt-8">
        <h2 class="text-xl font-bold mb-4 mea-text border-b pb-3">
            <i class="fa-solid fa-clipboard-check mr-2"></i>สรุปการตรวจสอบ (Summary Report)
        </h2>
        <div id="summaryContent" class="p-4 bg-gray-50 rounded-xl border">
            <p class="text-gray-500 text-center">กรุณาทำรายการตรวจสอบเพื่อดูสรุปผล</p>
        </div>
    </div>

</div>

<div id="printContainer"></div>

<button id="printBtn" onclick="printChecklist()" class="floating-print mea-bg hover:opacity-90 text-white px-6 py-4 rounded-full shadow-lg font-semibold text-lg flex items-center transition-all">
    <i class="fa-solid fa-file-pdf mr-2 text-xl"></i> <span>สร้างไฟล์ PDF</span>
</button>

<button id="clearBtn" onclick="clearChecklist()" class="floating-clear bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-full shadow-lg font-semibold text-base transition-all">
    <i class="fa-solid fa-trash mr-2"></i> ล้างข้อมูล
</button>

<script>
const sections = [
    {
        title:"Section 1 : การตรวจสอบโครงสร้างและตู้ (Enclosure & Structure)",
        icon:"fa-building",
        critical:false,
        items:[
            ["1.1","ขนาดตู้ (กว้างxยาวxสูง)","ตามแบบที่อนุมัติ"],
            ["1.2","โครงสร้างตู้ทำจากเหล็กหนาไม่น้อยกว่า 3 มม.","Spec ข้อ 9.1"],
            ["1.3","ฝาตู้ทุกด้านเป็นชนิด Electrogalvanize และพ่นสี มีความหนา 2 มม.","Spec ข้อ 9.2"],
            ["1.4","สีตู้ RAL 9002 หรืออื่นๆ และความหนาสี ≥ 60 ไมครอน","Spec ข้อ 9.3"],
            ["1.5","Mimic bus (ตรวจสอบความถูกต้องของสีและขนาด)","Spec ข้อ 13"],
            ["1.6","Nameplate (ชื่อตู้, ระบุ From/To, ระบุชื่อ CB ทุกตัว)","Spec ข้อ 13"],
            ["1.7","ป้าย (MEA logo, QR code, Logo ผู้ผลิต)","Spec ข้อ 13"]
        ]
    },
    {
        title:"Section 2 : บัสบาร์และตัวนำ (Busbar & Conductors)",
        icon:"fa-network-wired",
        critical:false,
        items:[
            ["2.1","ตรวจสอบขนาด Line และ Neutral Busbar","Spec ข้อ 10.3<br>IEC 61439-1"],
            ["2.2","ตรวจสอบขนาด Ground Busbar","Spec ข้อ 10"],
            ["2.3","สาย Bonding ระหว่าง Neutral Busbar และ Ground Busbar (ถ้ามี)","ตามแบบ"],
            ["2.4","ตรวจสอบความถูกต้องของสี Busbar แต่ละเฟส","Spec ข้อ 10.7"]
        ]
    },
    {
        title:"Section 3 : เซอร์กิตเบรกเกอร์ (Circuit Breaker)",
        icon:"fa-bolt",
        critical:false,
        items:[
            ["3.1","ตรวจสอบ CB ตามแบบ (ยี่ห้อ, รุ่น, Rating CB (AT/AF), จำนวน Pole (1/3), Ics, Icu)","ตามแบบ"]
        ]
    },
    {
        title:"Section 4 : สายไฟและการเดินสาย (Cable & Wiring)",
        icon:"fa-plug",
        critical:false,
        items:[
            ["4.1","สายควบคุมเป็นชนิด IEC 08 (HVSF)","Spec ข้อ 11.1"],
            ["4.2","ขนาดสายควบคุม 2.5 ตร.มม.","Spec ข้อ 11.1"],
            ["4.3","สาย Ground บานประตู (ใช้สายทองแดงถัก 10 ตร.มม.)","Spec ข้อ 11.1"],
            ["4.4","Wire mark สายควบคุม (ชนิดปลอกสวม ระบุต้นทางและปลายทาง)","Spec ข้อ 11.5"],
            ["4.5","ตรวจสอบความถูกต้องของสีสายไฟฟ้าแต่ละวงจร","Spec ข้อ 10.6"]
        ]
    },
    {
        title:"Section 5 : อุปกรณ์เครื่องวัด (Current transformer, Lamp, Digital meter)",
        icon:"fa-gauge-high",
        critical:false,
        items:[
            ["5.1","Current Transformer (ตรวจสอบ Ratio, Class, Burden)","ตามแบบ"],
            ["5.2","Pilot lamp L1/L2/L3 ใช้สีขาว","Spec ข้อ 12.2"],
            ["5.3","Fuse (ถ้ามี) จัดหาสำรอง 10% ของทั้งหมด","Spec ข้อ 12.3"]
        ]
    },
    {
        title:"Section 6 : ทดสอบการทำงาน (Function test)",
        icon:"fa-gears",
        critical:false,
        items:[
            ["6.1","ทดสอบการทำงานของวงจรควบคุม (Alarm, status, trip, interlock, …)",""],
            ["6.2","ทดสอบการทำงานของ Meter (V/I/Watt/Var/VA/p.f.)",""],
            ["6.3","ทดสอบ Test trip ของ MCCB",""],
            ["6.4","ทดสอบ Trip unit ของ ACB",""]
        ]
    },
    {
        title:"Section 7 : การทดสอบไฟฟ้า (Electrical Testing)",
        icon:"fa-triangle-exclamation",
        critical:true,
        items:[
            ["7.1","Dielectric test ด้วยแรงดัน 2000VAC เป็นเวลา 1 นาที<br><span class='text-mea-orange font-medium mt-1 inline-block'>*ค่าที่ยอมรับได้ : ไม่ Breakdown*</span>","IEC 61439-1"],
            ["7.2","Insulation Resistance Test ด้วยแรงดัน 1000VDC 1 นาที<br><span class='text-mea-orange font-medium mt-1 inline-block'>*ค่าที่ยอมรับได้ ≥ 1 MegaOhm*</span>","IEC 61439-1"],
            ["7.3","Ground Continuity Test<br><span class='text-mea-orange font-medium mt-1 inline-block'>*ค่าที่ยอมรับได้ ≤ 0.1 Ohm*</span>","IEC 60335-1"],
            ["7.4","ทดสอบ Contact resistance<br><span class='text-mea-orange font-medium mt-1 inline-block'>*ค่าที่ยอมรับได้ : ตาม datasheet ของ CB*</span>",""]
        ]
    }
];

// ==========================================
// การสร้าง UI สำหรับหน้าแอป
// ==========================================
const container = document.getElementById("checklistContainer");
let fullHtml = ""; 

sections.forEach((section, sIndex)=>{
    let html = `
    <div class="bg-white rounded-2xl shadow-md overflow-hidden mb-6">
        <div class="${section.critical ? 'critical-header' : 'section-header'} text-white p-4">
            <div class="flex items-center justify-between">
                <h2 class="font-bold text-lg md:text-xl flex items-center gap-3">
                    <div class="bg-white text-gray-700 w-10 h-10 rounded-lg flex items-center justify-center shadow">
                        <i class="fa-solid ${section.icon}"></i>
                    </div>
                    ${section.title}
                </h2>
                ${section.critical ? '<span class="bg-white text-red-600 px-3 py-1 rounded-full text-xs font-bold">CRITICAL TEST</span>' : ''}
            </div>
        </div>
        <div class="p-4">
            <div class="hidden md:grid md:grid-cols-12 gap-3 font-semibold text-gray-700 border-b pb-3 mb-3">
                <div class="col-span-1">Item</div>
                <div class="col-span-6">Description</div>
                <div class="col-span-2">Reference</div>
                <div class="col-span-3">Result</div>
            </div>
    `;

    section.items.forEach((item, i)=>{
        const radioName = `section${sIndex}_item${i}`;
        html += `
            <div class="check-item border rounded-xl p-4 mb-3 bg-gray-50">
                <div class="grid md:grid-cols-12 gap-3 items-start">
                    <div class="md:col-span-1"><span class="font-bold text-lg">${item[0]}</span></div>
                    <div class="md:col-span-6"><div class="font-medium">${item[1]}</div></div>
                    <div class="md:col-span-2"><span class="text-sm text-gray-600">${item[2]}</span></div>
                    <div class="md:col-span-3">
                        <div class="flex gap-2">
                            <label class="radio-card pass-option border rounded-lg px-3 py-2 cursor-pointer flex-1 text-center bg-white">
                                <input type="radio" name="${radioName}" value="Pass" class="sr-only">
                                <i class="fa-solid fa-circle-check"></i> ผ่าน
                            </label>
                            <label class="radio-card fail-option border rounded-lg px-3 py-2 cursor-pointer flex-1 text-center bg-white">
                                <input type="radio" name="${radioName}" value="Fail" class="sr-only">
                                <i class="fa-solid fa-circle-xmark"></i> ไม่ผ่าน
                            </label>
                        </div>
                    </div>
                </div>
                <div class="remarks-container mt-3 pt-3 border-t border-gray-200">
                    <label class="block text-xs font-medium text-gray-500 mb-1">หมายเหตุ (Remarks)</label>
                    <textarea class="remarks-input w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-orange-500 transition-all" 
                              rows="1" placeholder=""></textarea>
                </div>
            </div>
        `;
    });
    html += `</div></div>`;
    fullHtml += html;
});
container.innerHTML = fullHtml;

// จัดการ UI ของปุ่ม Radio
document.addEventListener("change",(e)=>{
    if(e.target.type === "radio"){
        const group = document.querySelectorAll(`input[name="${e.target.name}"]`);
        group.forEach(radio=>{
            const label = radio.closest("label");
            label.classList.remove("pass-selected", "fail-selected");
        });
        const selectedLabel = e.target.closest("label");
        if(e.target.value === "Pass"){
            selectedLabel.classList.add("pass-selected");
        }else{
            selectedLabel.classList.add("fail-selected");
        }
    }
});

// ==========================================
// ฟังก์ชันจัดการ PDF ด้วย html2pdf
// ==========================================
async function printChecklist() {
    const printBtn = document.getElementById("printBtn");
    const originalContent = printBtn.innerHTML;
    
    // แสดงสถานะโหลด
    printBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> สร้างเอกสาร...';
    printBtn.disabled = true;

    // สร้าง HTML สำหรับ PDF
    buildPdfDocument();
    
    const element = document.getElementById("printContainer");
    element.style.display = "block"; // เปิดให้แสดงชั่วคราวซ้อนไว้หลังสุด

    const opt = {
        margin: [15, 10, 15, 10], // top, left, bottom, right
        filename: `FAT_MDB_Checklist_${new Date().getTime()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, 
            useCORS: true,
            windowWidth: 800,
            scrollY: 0 // บังคับเริ่มแคปหน้าจอจากบนสุดเสมอ
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] } // ช่วยป้องกันการตัดขาดกลางข้อ
    };

    try {
        await html2pdf().set(opt).from(element).save();
    } catch (error) {
        console.error("PDF Generation Error:", error);
        alert("เกิดข้อผิดพลาดในการสร้างไฟล์ PDF");
    } finally {
        element.style.display = "none"; // ซ่อนกลับ
        element.innerHTML = ""; 
        printBtn.innerHTML = originalContent;
        printBtn.disabled = false;
    }
}

// ==========================================
// ฟังก์ชันสร้างหน้าตา PDF
// ==========================================
function buildPdfDocument() {
    const printDiv = document.getElementById("printContainer");
    const now = new Date();
    const timeStr = `${now.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })} เวลา ${now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} น.`;

    let html = `
    <div style="font-family: 'Prompt', sans-serif; color: #1f2937;">
        
        <div style="text-align: center; border-bottom: 2px solid #F37021; padding-bottom: 15px; margin-bottom: 20px;">
            <h1 style="color: #F37021; margin: 0 0 5px 0; font-size: 24px;">MDB Factory Acceptance Test (FAT)</h1>
            <p style="margin: 0; color: #6b7280; font-size: 14px;">รายงานผลการตรวจสอบตู้ Main Distribution Board</p>
        </div>

        <table style="width: 100%; margin-bottom: 25px; border-collapse: collapse;">
            <tr>
                <td style="padding: 8px; border: 1px solid #e5e7eb; background: #f9fafb; width: 25%;"><b>Reference Spec</b></td>
                <td style="padding: 8px; border: 1px solid #e5e7eb;">${document.getElementById("referenceSpec").value || '-'}</td>
                <td style="padding: 8px; border: 1px solid #e5e7eb; background: #f9fafb; width: 25%;"><b>Project No.</b></td>
                <td style="padding: 8px; border: 1px solid #e5e7eb;">${document.getElementById("projectNo").value || '-'}</td>
            </tr>
            <tr>
                <td style="padding: 8px; border: 1px solid #e5e7eb; background: #f9fafb;"><b>ผู้ตรวจสอบ</b></td>
                <td style="padding: 8px; border: 1px solid #e5e7eb;">${document.getElementById("inspectorName").value || '...........................................'}</td>
                <td style="padding: 8px; border: 1px solid #e5e7eb; background: #f9fafb;"><b>วันที่ตรวจ</b></td>
                <td style="padding: 8px; border: 1px solid #e5e7eb;">${timeStr}</td>
            </tr>
        </table>
    `;

    // Loop ข้อมูลแบบฟอร์ม
    sections.forEach((section, sIndex) => {
        const bgHead = section.critical ? '#ef4444' : '#F37021';
        
        html += `
        <h2 style="background: ${bgHead}; color: white; padding: 8px 12px; margin: 20px 0 10px 0; font-size: 16px; border-radius: 4px;" class="pdf-avoid-break">
            ${section.title}
        </h2>
        `;

        section.items.forEach((item, i) => {
            const name = `section${sIndex}_item${i}`;
            const radioEl = document.querySelector(`input[name="${name}"]:checked`);
            const result = radioEl ? radioEl.value : "ไม่ได้ประเมิน";
            
            // ใช้ Helper Function หา Index ของ Remarks
            const rIndex = getRemarkIndex(sIndex, i);
            const remarkText = document.querySelectorAll(".remarks-input")[rIndex]?.value.trim() || "-";

            let resultHtml = "";
            if(result === "Pass") resultHtml = `<span style="color:#16a34a; font-weight:bold;">[ ✓ ผ่าน ]</span>`;
            else if(result === "Fail") resultHtml = `<span style="color:#dc2626; font-weight:bold;">[ ✗ ไม่ผ่าน ]</span>`;
            else resultHtml = `<span style="color:#9ca3af;">[ - ]</span>`;

            html += `
            <div class="pdf-avoid-break" style="border: 1px solid #e5e7eb; padding: 10px 12px; margin-bottom: 8px; border-radius: 6px; background: #fff;">
                <table style="width: 100%; border: none;">
                    <tr>
                        <td style="width: 40px; vertical-align: top; font-weight: bold;">${item[0]}</td>
                        <td style="vertical-align: top;">${item[1]}<br><span style="font-size: 11px; color: #6b7280;">(อ้างอิง: ${item[2]})</span></td>
                        <td style="width: 100px; vertical-align: top; text-align: right;">${resultHtml}</td>
                    </tr>
                </table>
                <div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e5e7eb; font-size: 13px;">
                    <b>หมายเหตุ:</b> <span style="color: #4b5563;">${escapeHTML(remarkText)}</span>
                </div>
            </div>
            `;
        });
    });

    // ดึงโค้ดหน้า Summary จากแอปมาแปะต่อท้ายด้วย
    const summaryHtml = document.getElementById("summaryContent").innerHTML;

    html += `
        <div style="margin-top: 30px; page-break-before: always;">
            <h2 style="color: #F37021; border-bottom: 2px solid #F37021; padding-bottom: 10px; font-size: 18px;">สรุปผลการตรวจสอบ (Summary Report)</h2>
            <div style="padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb;">
                ${summaryHtml}
            </div>
            
            <div style="margin-top: 50px; text-align: right;" class="pdf-avoid-break">
                <p style="margin: 0 0 30px 0;">ลงชื่อผู้ตรวจสอบ ..............................................................</p>
                <p style="margin: 0;">( ${document.getElementById("inspectorName").value || '...........................................'} )</p>
            </div>
        </div>
    </div>
    `;

    printDiv.innerHTML = html;
}

// ==========================================
// Helper Functions
// ==========================================
function getRemarkIndex(sectionIndex, itemIndex) {
    let index = 0;
    for(let s = 0; s < sectionIndex; s++) {
        index += sections[s].items.length;
    }
    return index + itemIndex;
}

function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
}

function updateSummary() {
    const items = document.querySelectorAll('.check-item');
    let passCount = 0;
    let failList = [];
    let pendingCount = 0;

    items.forEach((itemDom) => {
        const itemNumber = itemDom.querySelector('.font-bold').innerText;
        const itemDesc = itemDom.querySelector('.font-medium').innerHTML.split('<br>')[0]; 
        const checkedRadio = itemDom.querySelector('input[type="radio"]:checked');
        const remarkRaw = itemDom.querySelector('.remarks-input').value.trim();
        const remarkSafe = remarkRaw ? escapeHTML(remarkRaw) : '<span style="color:#9ca3af; font-style:italic;">ไม่ได้ระบุหมายเหตุ</span>';

        if (!checkedRadio) pendingCount++;
        else if (checkedRadio.value === 'Pass') passCount++;
        else if (checkedRadio.value === 'Fail') failList.push({ title: `${itemNumber} ${itemDesc}`, remark: remarkSafe });
    });

    const summaryContainer = document.getElementById('summaryContent');
    if (items.length === 0) return;
    if (pendingCount === items.length) {
        summaryContainer.innerHTML = `<p class="text-gray-500 text-center">กรุณาทำรายการตรวจสอบเพื่อดูสรุปผล</p>`;
        return;
    }

    let html = '';
    if (failList.length === 0 && pendingCount === 0) {
        html = `<div style="color: #15803d; font-weight: bold; font-size: 16px;">✓ ผ่านเกณฑ์ทั้งหมด (All Passed)</div><p style="margin-top:5px; font-size:14px; color:#4b5563;">การตรวจสอบสมบูรณ์แบบ ไม่มีข้อบกพร่อง</p>`;
    } else {
        if (failList.length > 0) {
            html += `<div style="color: #dc2626; font-weight: bold; font-size: 16px; margin-bottom: 15px;">✗ พบรายการ ไม่ผ่าน จำนวน ${failList.length} ข้อ</div>`;
            failList.forEach(fail => {
                html += `
                <div style="background: white; border: 1px solid #fecaca; padding: 10px; margin-bottom: 10px; border-radius: 6px;">
                    <p style="color: #dc2626; font-weight: bold; margin: 0 0 5px 0;">ข้อ ${fail.title}</p>
                    <div style="font-size: 13px; color: #4b5563; background: #f9fafb; padding: 8px; border: 1px solid #e5e7eb; border-radius: 4px;">
                        <b>หมายเหตุ:</b> ${fail.remark}
                    </div>
                </div>`;
            });
        } else {
             html += `<div style="color: #1d4ed8; font-weight: bold; font-size: 16px;">ℹ ผ่านเกณฑ์แล้ว ${passCount} ข้อ (ยังไม่พบข้อบกพร่อง)</div>`;
        }
        if (pendingCount > 0) html += `<p style="color: #ea580c; font-size: 14px; margin-top: 15px;">* ยังมีรายการที่รอการตรวจสอบอีก ${pendingCount} ข้อ</p>`;
    }
    summaryContainer.innerHTML = html;
}

// ==========================================
// Save & Load Data (LocalStorage)
// ==========================================
function saveData(){
    const data = {
        referenceSpec : document.getElementById("referenceSpec")?.value || "",
        projectNo : document.getElementById("projectNo")?.value || "",
        inspector : document.getElementById("inspectorName")?.value || "",
        remarks : [],
        radios : {}
    };

    document.querySelectorAll(".remarks-input").forEach(input => data.remarks.push(input.value));
    document.querySelectorAll('input[type="radio"]:checked').forEach(radio => data.radios[radio.name] = radio.value);

    localStorage.setItem("mdb_fat_checklist", JSON.stringify(data));
    updateSummary(); 
}

document.addEventListener("input", saveData);
document.addEventListener("change", saveData);

document.addEventListener("input",(e)=>{
    if(e.target.classList.contains("remarks-input")){
        e.target.style.height = "auto";
        e.target.style.height = e.target.scrollHeight + "px";
    }
});

function clearChecklist(){
    if(confirm("ต้องการล้างข้อมูลทั้งหมดหรือไม่?")){
        localStorage.removeItem("mdb_fat_checklist");
        location.reload();
    }
}

window.addEventListener("load",()=>{
    const saved = localStorage.getItem("mdb_fat_checklist");
    if(!saved) return;
    const data = JSON.parse(saved);
    
    if(document.getElementById("referenceSpec")) document.getElementById("referenceSpec").value = data.referenceSpec || "";
    if(document.getElementById("projectNo")) document.getElementById("projectNo").value = data.projectNo || "";
    if(document.getElementById("inspectorName")) document.getElementById("inspectorName").value = data.inspector || "";

    document.querySelectorAll(".remarks-input").forEach((input, index)=>{
        if(data.remarks && data.remarks[index] !== undefined) input.value = data.remarks[index];
        input.style.height = "auto";
        input.style.height = input.scrollHeight + "px";
    });

    Object.keys(data.radios || {}).forEach(name=>{
        const radio = document.querySelector(`input[name="${name}"][value="${data.radios[name]}"]`);
        if(radio){
            radio.checked = true;
            const label = radio.closest("label");
            if(radio.value === "Pass") label.classList.add("pass-selected");
            else label.classList.add("fail-selected");
        }
    });
    updateSummary();
});
</script>
